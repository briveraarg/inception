services:
  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    env_file: .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - /home/${USER}/data/mariadb:/var/lib/mysql
    networks:
      - inception
    restart: on-failure

  wordpress:
    build: requirements/wordpress
    container_name: wordpress
    env_file: .env
    secrets:
      - db_password
      - wp_admin_password
      - wpuser_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: on-failure
    depends_on:
      - mariadb

  nginx:
    build: requirements/nginx
    container_name: nginx
    env_file: .env
    ports:
      - "${HTTPS_PORT:-443}:443"
    secrets:
      - server.crt
      - server.key
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: on-failure
    depends_on:
      - wordpress

secrets:
  db_password:
    file: ../secrets/db_password
  db_root_password:
    file: ../secrets/db_root_password
  wp_admin_password:
    file: ../secrets/wp_admin_password
  wpuser_password:
    file: ../secrets/wpuser_password
  server.crt:
    file: ../secrets/server.crt
  server.key:
    file: ../secrets/server.key

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress

networks:
  inception:
    driver: bridge
