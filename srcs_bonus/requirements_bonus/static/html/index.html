<!doctype html>
<!-- ************************************************************************** -->
<!--                                                                            -->
<!--                         Sorteo de Elementos Químicos                        -->
<!--                                                                            -->
<!--   Archivo : tabla.html                                                      -->
<!--   Nota    : Interfaz para sortear elementos de la tabla periódica sin       -->
<!--             repeticiones, reutilizando la cabecera del generador.           -->
<!--                                                                            -->
<!-- ************************************************************************** -->

<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ruleta Química</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
	:root
	{
	  font-family: 'Lato', Arial, Helvetica, sans-serif;
	  --azul: #054cf4ff;
	  --violeta: #5a4fe1ff;
	  --verde: #baf058;
	  --texto-oscuro: #0b1b2b;
	  --fondo: #ffffff;
	  --gris: #e8edf2;
	}

	body {
	  padding: 0;
	  margin: 0;
	  background-color: var(--fondo);
	  background-image:
		linear-gradient(0deg, transparent 19px, var(--verde) 20px),
		linear-gradient(90deg, transparent 19px, var(--verde) 20px);
	  background-size: 20px 20px;
	  background-position: center center;
	  min-height: 100vh;
	  display: flex;
	  flex-direction: column;
	}

	/* ************************************************************************** */
	/*  Cabecera heredada del generador de cartones                               */
	/* ************************************************************************** */
	.taco-violeta {
	  width: 100%;
	  background: var(--azul);
	  margin: 0;
	  display: flex;
	  justify-content: center;
	  padding: 18px 0;
	  box-sizing: border-box;
	}

	.taco-violeta-content {
	  width: 100%;
	  max-width: 1200px;
	  margin: 0 auto;
	  display: flex;
	  align-items: center;
	  justify-content: space-between;
	  gap: 32px;
	  padding: 18px 32px;
	  box-sizing: border-box;
	}

	.taco-violeta-textos {
	  display: flex;
	  flex-direction: column;
	  gap: 8px;
	}

	.taco-violeta h1 {
	  color: #fff;
	  margin: 0;
	  font-size: 42px;
	  font-weight: 900;
	  text-shadow: 0 0 4px rgba(0, 0, 0, 0);
	}

	.taco-violeta p {
	  margin: 0;
	  color: #fff;
	  font-size: 18px;
	  max-width: 520px;
	}

	.logo-fiq {
	  height: 72px;
	  width: auto;
	  filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.12));
	}

	.mas-actividades span {
	  color: var(--verde);
	  font-weight: 700;
	}

	.mas-actividades a {
	  color: #fff;
	  font-weight: 700;
	  text-decoration: none;
	}

	/* ************************************************************************** */
	/*  Contenedor principal y tarjeta de resultado                               */
	/* ************************************************************************** */
	.wrapper {
	  flex: 1;
	  display: flex;
	  justify-content: center;
	  padding: 40px 16px;
	  box-sizing: border-box;
	}

	.sorter-card {
	  width: 100%;
	  max-width: 990px;
	  background: var(--fondo);
	  border-radius: 18px;
	  box-shadow: 0 24px 48px rgba(115, 114, 114, 0,1);
	  padding: 90px;
	  display: flex;
	  flex-direction: column;
	  gap: 40px;
	}

	.result-display {
	  display: flex;
	  flex-direction: column;
	  align-items: center;
	  gap: 24px;
	}

		.element-card {
			border: 3px solid var(--violeta);
			border-radius: 16px;
			padding: 60px;
			background: linear-gradient(135deg, rgba(255, 255, 255, 0), rgba(90, 79, 225, 0.05));
			width: 470px;
			height: 470px;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			gap: 2px;
			position: relative;
			overflow: hidden;
			box-sizing: border-box;
		}

	.element-card::after {
	  content: "";
	  position: absolute;
	  inset: 0;
	  background: radial-gradient(circle at top, rgba(255, 255, 255, 0.35), transparent 60%);
	  pointer-events: none;
	}

	.element-number {
	  font-size: 36px;
	  font-weight: 700;
	  color: var(--azul);
	  position: absolute;
	  top: 30px;
	  right: 25px;
	  line-height: 1;
	}

	.element-symbol {
	  font-size: 140px;
	  font-weight: 900;
	  color: var(--texto-oscuro);
	  letter-spacing: 1;
	}

	.element-name {
		font-size: 32px;
		font-weight: 700;
		color: var(--texto-oscuro);
	}

	.element-extra {
	  font-size: 24px;
	  opacity: 0.7;
	  line-height: 2;
	}

	.element-card.spin {
	  animation: pulse 0.6s ease-in-out infinite alternate;
	}

	.element-card.flash {
	  animation: highlight 0.8s ease-out;
	}

	@keyframes pulse {
	  from {
		transform: scale(1);
	  }

	  to {
		transform: scale(1.03);
	  }
	}

	@keyframes highlight {
	  0% {
		box-shadow: 0 0 0 rgba(79, 225, 91, 0.6);
		transform: scale(1.05);
	  }

	  100% {
		box-shadow: 0 0 0 rgba(90, 79, 225, 0);
		transform: scale(1);
	  }
	}

	.controls {
	  display: flex;
	  flex-wrap: wrap;
	  justify-content: center;
	  gap: 14px;
	}

	.controls button {
	  border: none;
	  border-radius: 10px;
	  padding: 12px 36px;
	  font-size: 20px;
	  font-weight: 700;
	  font-family: inherit;
	  cursor: pointer;
	  transition: transform 0.2s ease, box-shadow 0.2s ease;
	}

	.controls button:disabled {
	  cursor: not-allowed;
	  opacity: 0.6;
	}

	.btn-draw {
	  background: var(--azul);
	  color: #fff;
	}

	.btn-reset {
	  background: var(--verde);
	  color: var(--texto-oscuro);
	}

	.controls button:not(:disabled):hover {
	  transform: translateY(-2px);
	  box-shadow: 0 16px 28px rgba(25, 35, 54, 0.18);
	}

	.history {
	  display: grid;
	  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
	  gap: 16px;
	  padding-right: 4px;
	}

	.history-item {
	  position: relative;
	  border: 2px solid var(--verde);
	  border-radius: 0px;
	  padding: 14px 16px;
	  background: var(--fondo);
	  display: grid;
	  grid-template-rows: auto 1fr auto;
	  justify-items: center;
	  align-items: center;
	  gap: 6px;
	  aspect-ratio: 1;
	  box-sizing: border-box;
	}

	.history-number {
	  justify-self: stretch;
	  font-size: 16px;
	  font-weight: 700;
	  color: var(--violeta);
	  width: 100%;
	  text-align: right;
	}

	.history-symbol {
	  font-size: 50px;
	  font-weight: 900;
	  letter-spacing: 1px;
	  color: var(--violeta);
	}

	.history-name {
	  font-size: 14px;
	  font-weight: 600;
	  text-align: center;
	  color: var(--violeta);
	  line-height: 1.15;
	}

	.empty-state {
	  text-align: center;
	  padding: 32px;
	  border: 2px dashed rgba(255, 255, 255, 0.35);
	  border-radius: 16px;
	  color: rgba(11, 27, 43, 0.6);
	  font-style: italic;
	}

	@media (max-width: 720px) {
	  .taco-violeta-content {
		flex-direction: column;
		text-align: center;
		gap: 16px;
	  }

	  .logo-fiq {
		height: 56px;
	  }

	  .sorter-card {
		padding: 24px;
	  }

			.element-card {
				width: min(100%, 280px);
				height: auto;
				padding: 40px;
			}

	  .element-symbol {
		font-size: 56px;
	  }
	}
  </style>
</head>

		<div class="mas-actividades">

		<div class="history" id="history"></div>

	  </div>
	</section>
  </main>

	const currentElementCard = document.getElementById('current-element');
	const numberEl = currentElementCard.querySelector('.element-number');
	const symbolEl = currentElementCard.querySelector('.element-symbol');
	const nameEl = currentElementCard.querySelector('.element-name');
	const extraEl = currentElementCard.querySelector('.element-extra');
	const historyContainer = document.getElementById('history');
	const emptyHistory = document.getElementById('empty-history');
	const remainingCountEl = document.getElementById('remaining-count');
	const statusMessageEl = document.getElementById('status-message');
	const drawButton = document.getElementById('draw-button');
	const resetButton = document.getElementById('reset-button');

	let available = [...elements];
	let history = [];
	let spinning = false;
	let spinInterval = null;

	function formatCategory(category) {
	  return category ? `${category}` : 'Sin clasificación';
	}

	function updateCard(element) {
	  if (!element) {
		numberEl.textContent = 'N.º';
		symbolEl.textContent = '--';
		nameEl.textContent = 'Esperando sorteo...';
		extraEl.textContent = 'Sin datos todavía';
		return;
	  }
	  numberEl.textContent = `N.º ${element.number}`;
	  symbolEl.textContent = element.symbol;
	  nameEl.textContent = element.name;
	  extraEl.textContent = formatCategory(element.category);
	}

	function updateHistory() {
	  historyContainer.innerHTML = '';
	  if (history.length === 0) {
		emptyHistory.style.display = 'block';
		return;
	  }
	  emptyHistory.style.display = 'none';
	  history.forEach(item => {
		const div = document.createElement('div');
		div.className = 'history-item';
		div.innerHTML = `
		  <span class="history-number">${item.number}</span>
		  <span class="history-symbol">${item.symbol}</span>
		  <span class="history-name">${item.name}</span>
		`;
		historyContainer.appendChild(div);
	  });
	}

	function updateRemaining() {
	  if (remainingCountEl) {
		remainingCountEl.textContent = available.length.toString();
	  }
	}

	function drawElement() {
	  if (spinning || available.length === 0) {
		return;
	  }
	  spinning = true;
	  drawButton.disabled = true;
	  if (statusMessageEl) {
		statusMessageEl.textContent = 'Girando la ruleta...';
	  }
	  currentElementCard.classList.add('spin');

	  spinInterval = setInterval(() => {
		const preview = available[Math.floor(Math.random() * available.length)];
		updateCard(preview);
	  }, 120);

	  setTimeout(() => {
		clearInterval(spinInterval);
		spinInterval = null;
		const index = Math.floor(Math.random() * available.length);
		const element = available.splice(index, 1)[0];
		history.unshift(element);
		updateCard(element);
		updateHistory();
		updateRemaining();
		if (statusMessageEl) {
		  statusMessageEl.textContent = `Elemento sorteado: ${element.name}`;
		}
		currentElementCard.classList.remove('spin');
		currentElementCard.classList.add('flash');
		currentElementCard.addEventListener('animationend', () => currentElementCard.classList.remove('flash'), { once: true });
		spinning = false;
		drawButton.disabled = available.length === 0;
		if (available.length === 0 && statusMessageEl) {
		  statusMessageEl.textContent = 'Se sortearon todos los elementos. Usá "Reiniciar" para comenzar otra vez.';
		}
	  }, 2400);
	}

	function resetDraw() {
	  if (spinning) {
		return;
	  }
	  available = [...elements];
	  history = [];
	  updateCard(null);
	  updateHistory();
	  updateRemaining();
	  if (statusMessageEl) {
		statusMessageEl.textContent = 'Preparado para sortear.';
	  }
	  drawButton.disabled = false;
	}

	drawButton.addEventListener('click', drawElement);
	resetButton.addEventListener('click', resetDraw);

	updateCard(null);
	updateHistory();
	updateRemaining();
  </script>
</body>

</html>
