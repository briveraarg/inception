<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sorteador de Fotos — Bingo Argentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul: #74c0fc;
            --azul-line: rgba(116,192,252,0.18);
            --blanco: #ffffff;
            --texto: #083344
        }

        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Alegreya Sans', Inter, system-ui, Arial, sans-serif;
            color: var(--texto)
        }

        body {
            /* Fondo: grilla de cuadrados formados por líneas celestes */
            background-color: var(--blanco);
            background-image:
                linear-gradient(to right, var(--azul-line) 2px, transparent 2px),
                linear-gradient(to bottom, var(--azul-line) 2px, transparent 2px);
            /* tamaño de cada celda */
            background-size: 48px 48px;
            /* centrar la app como antes */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 58px;
            box-sizing: border-box
        }

        .app {
            width: 100%;
            max-width: 1100px;
            background: rgba(200, 72, 72, 0.0);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            padding: 18px;
        }

        header {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        /* flag removed per user request */

        h1 {
            font-size: 44px;
            margin: 0;
            font-weight: 800; /* extra-bold */
        }

        .controls {
            margin-top: 18px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center; /* center the buttons */
            align-items: center;
        }

        button {
            background: var(--azul);
            border: none;
            color: var(--texto);
            padding: 12px 22px;
            border-radius: 12px;
            font-weight: 700; /* bold */
            font-size: 16px;
            min-width: 160px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(4,24,40,0.06);
            transition: transform 150ms ease, box-shadow 150ms ease;
            font-family: 'Alegreya Sans', Inter, system-ui, Arial, sans-serif; /* ensure buttons use Alegreya Sans */
        }

        button.secondary {
            background: transparent;
            border: 2px solid rgba(3, 139, 250, 0.913);
            color :var(--blanco);
        }

        /* specific colors for main controls */
        #spinBtn {
            background: var(--azul);
            color: var(--texto);
            border: none;
            font-family: 'Alegreya Sans', Inter, system-ui, Arial, sans-serif;
        }

        #resetBtn {
            background: #ffd54a;
            color: var(--texto);
            border: none;
            font-family: 'Alegreya Sans', Inter, system-ui, Arial, sans-serif;
        }

        /* hover/focus effects */
        #spinBtn:hover, #spinBtn:focus { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(4,24,40,0.12); }
        #resetBtn:hover, #resetBtn:focus { transform: translateY(-3px); box-shadow: 0 10px 26px rgba(4,24,40,0.12); }

        main {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 16px;
            margin-top: 0px
        }

        .viewer {
            min-height: 460px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 14px;
        }

        .photo-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 30px
            ;position:relative
        }

        .photo-wrap img {
            max-width: 100%;
            max-height: 340px;
            border-radius: 10px;
            /* remove soft blur shadow — we use a flat planar shadow behind */
            box-shadow: none;
            object-fit: contain;
            position: relative;
            z-index: 3;
        }

        /* flat planar shadow effect behind the main photo using pseudo-elements */
        .photo-wrap {
            position: relative; /* ensure pseudo-elements are positioned relative to container */
        }

        /* gray plane offset (shadow) */
        .photo-wrap::before {
            content: "";
            position: absolute;
            width: min(72%, 520px);
            height: min(56%, 420px);
            left: 50%;
            top: 50%;
            transform: translate(calc(-50% + 18px), calc(-50% + 18px)); /* offset to the right and down */
            background: #d9d9d9; /* flat gray plane */
            border-radius: 12px;
            z-index: 1;
        }

        /* white card layer that sits above the gray plane and behind the image */
        .photo-wrap::after {
            content: "";
            position: absolute;
            width: min(70%, 500px);
            height: min(54%, 400px);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            border-radius: 10px;
            z-index: 2;
            box-shadow: none;
        }

        /* photo-cell removed — main image will be appended directly into .photo-wrap */

        .caption {
            font-weight: 800;
            text-align: center
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .history {
            background:rgb(255, 221, 0);
            border-radius: 8px;
            padding: 10px;
            max-height: 600px;
            min-height: 66px;
            min-width: 360px;
            overflow:auto;
            border: 0px solid rgba(3, 139, 250, 0.913);
              display: grid;
              grid-template-columns: repeat(5, 64px);
              gap: 10px;
              justify-content: start;
              align-items: start;
        }

        .pill {
            display:none;
        }

        .thumb {
            width: 52px;
            height: 52px;
            border-radius: 6px;
            overflow: hidden;
            flex: 0 0 52px
        }

        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .meta {
            font-size: 13px
        }

        .meta .num {
            font-weight: 800
        }

        .grid-preview {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px
        }

        .grid-cell {
            height: 76px;
            background: linear-gradient(180deg, #fff, #f7fbff);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px dashed rgba(0, 0, 0, 0.04);
            overflow: hidden
        }

        .grid-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .wheel {
            width: 600px;
            height: 600px;
            position: center;
            border-radius: 0%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #fff, #f0f8ff);
            margin: 0 auto 6px;
            box-shadow: 0 10px 30px rgba(4, 24, 40, 0.06);
            overflow: hidden
        }

        .wheel img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }
        /* selector square that highlights the final image */
        .wheel .selector{
            position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(1);width:62%;height:62%;border-radius:8px;border:6px solid rgba(4,24,40,0.08);box-shadow:0 8px 20px rgba(4,24,40,0.12);display:none;pointer-events:none;box-sizing:border-box;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0));}
        .wheel .selector.show{display:block;animation:selectorPop 520ms cubic-bezier(.2,.9,.3,1)}
        @keyframes selectorPop{from{transform:translate(-50%,-50%) scale(0.86);opacity:0.2}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
    /* photoWrap selector */
    .photo-wrap .selector{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(1);width:62%;height:62%;border-radius:10px;border:6px solid rgba(4,24,40,0.08);box-shadow:0 8px 20px rgba(4,24,40,0.12);display:none;pointer-events:none;box-sizing:border-box;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0));}
    .photo-wrap .selector.show{display:block;animation:selectorPop 520ms cubic-bezier(.2,.9,.3,1)}

        footer {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.6)
        }

        @media(max-width:900px) {
            main {
                grid-template-columns: 1fr
            }

            .sidebar {
                order: 2
            }
        }

        /* responsive history columns: fewer columns on small screens */
        @media (max-width:800px) {
            .history { grid-template-columns: repeat(3, 64px); }
        }
        @media (max-width:480px) {
            .history { grid-template-columns: repeat(2, 64px); }
        }
    </style>
</head>

<body>
    <div class="app">
        <header>
            <div>
                <h1> « Bingo Argento »</h1>
            </div>
        </header>

        <div class="controls">
            <button id="spinBtn" class="secondary">Ruleta</button>
            <button id="resetBtn" class="secondary">Reiniciar</button>
        </div>

        <main>
            <div class="viewer">
                <div style="width:100%">
                    <div class="wheel" id="wheel" title="Ruleta">
                        <div style="font-size:36px;opacity:0.35">🇦🇷</div>
                        <div class="selector" id="selector"></div>
                    </div>
                    <div class="photo-wrap" id="photoWrap"></div>
                    <div class="caption" id="captionArea"></div>
                </div>
            </div>

            <aside class="sidebar">
                <div>
                    <div class="history" id="history"></div>
                </div>
                <!-- Preview (restantes) eliminado a pedido -->
            </aside>
        </main>

        <footer>
        </footer>
    </div>

    <script>
        // ===== SORTEADOR DE BINGO ARGENTINA =====
        // Este script gestiona un sorteador de fotos interactivo con rueda y historial
        // Características: Ruleta animada, historial visual, controles por teclado

        // Lista de archivos existentes en carpeta `fotos/` (proporcionados)
        const filenames = [
            "Ernesto 'Che' Guevara.png",
            "albertofernandez.png",
            "alfajores.png",
            "alfonsin.png",
            "argentina.jpeg",
            "artemis.png",
            "belgrano.png",
            "birome.png",
            "borges.png",
            "capanella.png",
            "carmenbarbieri.png",
            "cerati.png",
            "cinco_presidentes_en una semana.png",
            "cocasarli.png",
            "colapinto.png",
            "colectivo.png",
            "cristina.png",
            "charly.png",
            "dalila.png",
            "delarua.png",
            "dibujos_animados.png",
            "difuntacorrea.png",
            "dulce_de_leche.png",
            "el_pato_cabrera_.png",
            "eleonoracasano.png",
            "elgauchitogil.png",
            "elpapa.png",
            "fangio.png",
            "gabisabatini.png",
            "gardel.png",
            "gilda.png",
            "gladislabombatucumana.png",
            "huelladigital.png",
            "ivandepineda.png",
            "juanmartindel potro.png",
            "jujuy.png",
            "julioboca.png",
            "karina.png",
            "kichner.png",
            "lalocomotora.png",
            "lamonajimenez.png",
            "lapequeparetto.png",
            "lasleonas.png",
            "leomatilli.png",
            "lilitacarrio.png",
            "lospalmeras.png",
            "lostekis.png",
            "lucinaaymar.png",
            "luisaalbinoni.png",
            "macri.png",
            "mafalda.png",
            "manuginobeli.png",
            "maradona.png",
            "maraniella_nuñez.png",
            "maria_elena_walsh.png",
            "mariasusana.png",
            "martinfierro.png",
            "maxima.png",
            "menem.png",
            "mercadolibre.png",
            "mercedes_sosa.png",
            "messi.png",
            "mirtha_legrand.png",
            "moria_casan.png",
            "ricardodarin.png",
            "ricardofort.png",
            "rodrigo.png",
            "sabato.png",
            "sandro.png",
            "sanmartin.png",
            "santaolalla.png",
            "sarafaccio.png",
            "spineta.png",
            "susana.png",
            "valeriamassa.png"
        ];

        // Construir array de imágenes con ruta relativa y etiquetas legibles
        let imagesArray = filenames.map(f => ({ src: 'fotos/' + f, label: f.replace(/\.[^.]+$/, '').replace(/[_]/g, ' ').trim() }));
        
        // Estado del sorteo:
        // - remaining: índices de fotos aún no sorteadas
        // - drawn: índices de fotos ya sorteadas (en orden)
        let remaining = imagesArray.map((_, i) => i);
        let drawn = [];

        // ===== ELEMENTOS DEL DOM =====
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const photoWrap = document.getElementById('photoWrap');
        const captionArea = document.getElementById('captionArea');
        const historyEl = document.getElementById('history');
        const wheelEl = document.getElementById('wheel');

        // Codificar espacios y caracteres especiales en URLs
        function safeSrc(src) {
            return src.split('/').map(encodeURIComponent).join('/');
        }

        // Función de vista previa (deshabilitada)
        function renderPreview() { /* sin vista previa */ }

        // Actualizar el historial: mostrar miniaturas de fotos ya sorteadas (más recientes primero)
        function updateHistory() {
            historyEl.innerHTML = '';
            drawn.slice().reverse().forEach(idx => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.style.width = '64px';
                item.style.height = '64px';
                item.style.borderRadius = '6px';
                item.style.overflow = 'hidden';
                item.style.flex = '0 0 64px';
                const im = document.createElement('img');
                im.src = safeSrc(imagesArray[idx].src);
                im.alt = imagesArray[idx].label;
                im.style.width = '100%'; im.style.height = '100%'; im.style.objectFit = 'cover';
                item.appendChild(im);
                historyEl.appendChild(item);
            });
        }

        // Mostrar una imagen en el visor principal
        function showImage(idx) {
            photoWrap.innerHTML = '';
            const img = document.createElement('img'); img.src = safeSrc(imagesArray[idx].src); img.alt = imagesArray[idx].label;
            img.onerror = () => { img.style.objectFit = 'contain'; img.src = ''; img.alt = '(imagen no encontrada)'; img.style.background = '#eee'; };
        }

        // Seleccionar una imagen aleatoria de las restantes
        function takeRandom() {
                if (remaining.length === 0) return;
                const r = Math.floor(Math.random() * remaining.length);
                const idx = remaining.splice(r, 1)[0];
                drawn.push(idx);
                showImage(idx); updateHistory();
            }

        // Función principal de la ruleta: animar y sortear una foto
        function spinWheel() {
            if (remaining.length === 0) return alert('No quedan fotos para sacar.');
            spinBtn.disabled = true; resetBtn.disabled = true;
            // Configurar duración de la animación: más rápida con desaceleración suave
                const totalTicks = 16 + Math.floor(Math.random() * 22); // 16 a 37 fotogramas
                let time = 0; const durations = [];
                for (let i = 0; i < totalTicks; i++) { durations.push(18 + Math.pow(i / totalTicks, 1.8) * 520); }
            // Ciclo de animación de la rueda
            durations.forEach(d => {
                time += Math.round(d); setTimeout(() => {
                    const pick = remaining[Math.floor(Math.random() * remaining.length)]; wheelEl.innerHTML = ''; const im = document.createElement('img'); im.src = safeSrc(imagesArray[pick].src); im.alt = imagesArray[pick].label; wheelEl.appendChild(im);
                }, time);
            });

            // Final: mostrar la foto sorteada y actualizar interfaz
            setTimeout(() => {
                    const r = Math.floor(Math.random() * remaining.length); const finalIdx = remaining.splice(r, 1)[0]; drawn.push(finalIdx);
                    // Mostrar imagen final en rueda y visor
                wheelEl.innerHTML = ''; const finalImg = document.createElement('img'); finalImg.src = safeSrc(imagesArray[finalIdx].src); finalImg.alt = imagesArray[finalIdx].label; wheelEl.appendChild(finalImg);
                showImage(finalIdx); updateHistory();
                
                // Mostrar rectángulo de selección en rueda
                const selector = document.getElementById('selector');
                if(selector){ selector.classList.add('show'); selector.style.borderColor = 'rgba(4,24,40,0.12)'; }
                
                // Mostrar rectángulo de selección en foto principal
                let photoSelector = document.getElementById('photoSelector');
                if(!photoSelector){ photoSelector = document.createElement('div'); photoSelector.id = 'photoSelector'; photoSelector.className = 'selector'; photoWrap.appendChild(photoSelector); }
                photoSelector.classList.add('show'); photoSelector.style.borderColor = 'rgba(116,192,252,0.45)';
                
                // Reproducir sonido de finalización
                try{ playSound(); }catch(e){/* ignorar errores de audio */}
                
                // Ocultar rectángulos después de una breve pausa
                setTimeout(()=>{ if(selector) selector.classList.remove('show'); if(photoSelector) photoSelector.classList.remove('show'); }, 900);
                spinBtn.disabled = false; resetBtn.disabled = false;
            }, time + 120);
        }

        // Evento: clickear botón Ruleta
        spinBtn.addEventListener('click', spinWheel);

        // Evento: clickear botón Reiniciar
        resetBtn.addEventListener('click', () => {
            if (!confirm('¿Reiniciar sorteo y borrar historial?')) return;
            remaining = imagesArray.map((_, i) => i);
            drawn = [];
            photoWrap.innerHTML = '';
            captionArea.textContent = '';
            updateHistory();
        });

        // ===== CONTROLES DE TECLADO =====
        // Descargar estado del sorteo con Ctrl/Cmd+S
        function downloadState() { const blob = new Blob([JSON.stringify({ imagesArray, drawn, remaining }, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'sorteo_estado.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
        window.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); downloadState(); } });

        // Presionar ESPACIO para activar la ruleta (excepto si estamos escribiendo)
        window.addEventListener('keydown', function(e) {
            // Ignorar si se presionan teclas modificadoras
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            const active = document.activeElement;
            const isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable);
            if (isTyping) return;
            // Activar ruleta al presionar espacio
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                if (!spinBtn.disabled) spinWheel();
            }
        });

        // ===== AUDIO =====
        // Reproducir un sonido agradable tipo campana cuando se completa el sorteo
        function playSound(){
            try{
                const ctx = new (window.AudioContext||window.webkitAudioContext)();
                const now = ctx.currentTime;
                // Acordes mayores (Do5, Mi5, Sol5) para un sonido amigable
                const notes = [523.25, 659.25, 783.99];

                // Nodos principales de audio
                const master = ctx.createGain(); master.gain.value = 0.9;
                const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 5200;
                master.connect(filter);
                filter.connect(ctx.destination);

                // Reproducir cada nota del acorde
                notes.forEach((freq, i) => {
                    const t = now + i * 0.12;
                    // Dos osciladores por nota para un timbre más cálido
                    const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.setValueAtTime(freq, t);
                    const o2 = ctx.createOscillator(); o2.type = 'triangle'; o2.frequency.setValueAtTime(freq * 2, t); o2.detune.value = -10;

                    const g = ctx.createGain();
                    // Ataque rápido, sustain y decaimiento largo para efecto de campana
                    g.gain.setValueAtTime(0.0001, t);
                    g.gain.linearRampToValueAtTime(0.14, t + 0.03);
                    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);

                    o1.connect(g); o2.connect(g); g.connect(master);
                    o1.start(t); o2.start(t);
                    o1.stop(t + 1.4); o2.stop(t + 1.4);
                });
            }catch(err){ console.warn('Error de audio:', err); }
        }

        // ===== INICIALIZACIÓN =====
        renderPreview();
        updateHistory();

    </script>
</body>

</html>
